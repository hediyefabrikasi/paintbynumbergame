<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyama Oyunu</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h1{
margin:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

#game{
display:none;
}

canvas{
width:100%;
background:white;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
margin:10px;
}

#openPalette{
position:fixed;
bottom:20px;
right:20px;
background:#ff4d6d;
width:60px;
height:60px;
border-radius:50%;
font-size:26px;
}

#palettePopup{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top-left-radius:20px;
border-top-right-radius:20px;
padding:20px;
display:none;
box-shadow:0 -5px 20px rgba(0,0,0,0.2);
}

.colors{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.color{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
border:2px solid #ddd;
}

.brushes{
margin-top:10px;
}

.brush{
padding:10px;
border-radius:10px;
background:#eee;
margin:5px;
display:inline-block;
cursor:pointer;
}

.close{
position:absolute;
right:20px;
top:10px;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎨 Boyama Oyunu</h1>

<div class="gallery">

<img src="images/foto1.jpg" onclick="startGame(this.src)">
<img src="images/foto2.jpg" onclick="startGame(this.src)">
<img src="images/foto3.jpg" onclick="startGame(this.src)">

</div>

<div id="game">

<button onclick="goHome()">← Geri</button>

<canvas id="canvas"></canvas>

</div>

<button id="openPalette" onclick="openPalette()">🎨</button>

<div id="palettePopup">

<div class="close" onclick="closePalette()">✕</div>

<h3>Renkler</h3>

<div class="colors" id="colors"></div>

<h3>Fırça Boyutu</h3>

<div class="brushes">

<div class="brush" onclick="setBrush(10)">Küçük</div>
<div class="brush" onclick="setBrush(20)">Orta</div>
<div class="brush" onclick="setBrush(40)">Büyük</div>

</div>

</div>

<script>

const palette=[
"#000000","#ff0000","#00ff00","#0000ff",
"#ffff00","#ff00ff","#00ffff","#ffa500",
"#8a2be2","#ff69b4","#00ced1","#228b22"
]

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let painting=false
let brushSize=20
let color="#000"

function startGame(src){

document.querySelector(".gallery").style.display="none"
document.getElementById("game").style.display="block"

canvas.width=window.innerWidth
canvas.height=window.innerHeight-120

const img=new Image()

img.onload=()=>{

ctx.drawImage(img,0,0,canvas.width,canvas.height)

applyLineArt()

}

img.src=src

}

function applyLineArt(){

const imgData=ctx.getImageData(0,0,canvas.width,canvas.height)
const data=imgData.data

for(let i=0;i<data.length;i+=4){

const avg=(data[i]+data[i+1]+data[i+2])/3

if(avg>160){

data[i]=255
data[i+1]=255
data[i+2]=255

}else{

data[i]=0
data[i+1]=0
data[i+2]=0

}

}

ctx.putImageData(imgData,0,0)

}

canvas.addEventListener("touchstart",startPaint)
canvas.addEventListener("touchmove",paint)

function startPaint(e){

painting=true
paint(e)

}

function paint(e){

if(!painting)return

const rect=canvas.getBoundingClientRect()

const x=e.touches[0].clientX-rect.left
const y=e.touches[0].clientY-rect.top

ctx.fillStyle=color

ctx.beginPath()
ctx.arc(x,y,brushSize,0,Math.PI*2)
ctx.fill()

}

canvas.addEventListener("touchend",()=>painting=false)

function openPalette(){

document.getElementById("palettePopup").style.display="block"

}

function closePalette(){

document.getElementById("palettePopup").style.display="none"

}

function setBrush(size){

brushSize=size

}

function goHome(){

location.reload()

}

const colorContainer=document.getElementById("colors")

palette.forEach(c=>{

const div=document.createElement("div")
div.className="color"
div.style.background=c

div.onclick=()=>{

color=c

}

colorContainer.appendChild(div)

})

</script>

</body>
</html>
